<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>드래곤 힐스 C.C. - 태국 명문 골프장</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <link rel="stylesheet" href="./src/style.css">
  <style>
    /* 1. 첫 화면 히어로 섹션 (보내주신 이미지 디자인) */
    .hero { height: 70vh; display: flex; align-items: center; justify-content: center; text-align: center; color: white; position: relative; }
    .hero-bg { position: absolute; top: 0; left: 0; width: 100%; height: 100%; z-index: -1; }
    .hero-bg img { width: 100%; height: 100%; object-fit: cover; filter: brightness(0.5); }
    .hero-content h1 { font-size: 2.8rem; margin: 0; letter-spacing: 2px; }
    .hero-content p { font-size: 1.1rem; margin: 15px 0; opacity: 0.9; }
    .cta-btn { display: inline-block; padding: 12px 25px; background: #1a472a; color: white; text-decoration: none; border-radius: 25px; font-size: 14px; }

    /* 2. 3가지 특징 카드 섹션 */
    .features { display: flex; justify-content: space-around; padding: 40px 15px; background: white; flex-wrap: wrap; gap: 20px; }
    .feature-card { width: 30%; min-width: 280px; text-align: center; padding: 25px; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.05); border: 1px solid #f0f0f0; background: #fff; }
    .feature-icon { font-size: 32px; color: #1a472a; margin-bottom: 15px; background: #f0f4f1; width: 60px; height: 60px; line-height: 60px; border-radius: 50%; margin: 0 auto 15px; }

    /* 3. 갤러리 슬라이더 (추가된 부분) */
    .gallery-section { padding: 40px 15px; background: #f9f9f9; text-align: center; }
    .slider-container { position: relative; max-width: 800px; margin: 0 auto; overflow: hidden; border-radius: 15px; box-shadow: 0 8px 25px rgba(0,0,0,0.15); }
    .slides { display: none; width: 100%; animation: fade 0.8s; }
    .slides img { width: 100%; height: auto; min-height: 250px; max-height: 500px; object-fit: cover; display: block; }
    .slide-text { position: absolute; bottom: 0; width: 100%; background: rgba(0,0,0,0.7); color: white; padding: 12px 0; font-size: 16px; font-weight: bold; }
    .prev, .next { cursor: pointer; position: absolute; top: 50%; width: 44px; height: 44px; margin-top: -22px; color: white; background: rgba(26,71,42,0.8); border: none; border-radius: 50%; font-size: 20px; display: flex; align-items: center; justify-content: center; z-index: 10; }
    .next { right: 15px; } .prev { left: 15px; }
    @keyframes fade { from {opacity: 0.4} to {opacity: 1} }

    footer { padding: 30px; text-align: center; background: #1a472a; color: white; font-size: 13px; }
  </style>
</head>
<body>

  <header class="hero">
    <div class="hero-bg">
      <img src="./src/assets/panorama.jpg" onerror="this.src='https://via.placeholder.com/1200x800?text=Dragon+Hills+Panorama'">
    </div>
    <div class="hero-content">
      <h1>드래곤 힐스 C.C.</h1>
      <p>매 홀이 새로운 게임, 태국 라차부리의 완벽한 몰입</p>
      <a href="#reservation" class="cta-btn">실시간 예약하기</a>
    </div>
  </header>
