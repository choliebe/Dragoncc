<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>드래곤 힐스 C.C.</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        /* 1. 기본 설정 (잘림 방지 및 여백 제거) */
        * { box-sizing: border-box; -webkit-text-size-adjust: none; }
        body { margin: 0; padding: 0; font-family: 'Malgun Gothic', sans-serif; background: #f4f7f4; overflow-x: hidden; scroll-behavior: smooth; }

        /* 2. 상단 전경 섹션 (배경 어둡게 하여 글자 강조) */
        .hero { height: 65vh; min-height: 400px; position: relative; display: flex; align-items: center; justify-content: center; text-align: center; color: white; background: #000; padding: 0 20px; }
        .hero img { position: absolute; top: 0; left: 0; width: 100%; height: 100%; object-fit: cover; opacity: 0.5; z-index: 1; }
        .hero-content { position: relative; z-index: 2; width: 100%; }
        .hero-content h1 { font-size: clamp(2rem, 8vw, 3rem); margin: 0; font-weight: 900; color: #fff; text-shadow: 2px 2px 10px rgba(0,0,0,0.5); }
        .hero-content p { font-size: 1.1rem; margin: 15px 0 30px; opacity: 0.9; }

        /* 3. 반짝이는 금색 예약 버튼 (애니메이션 강화) */
        .cta-btn { 
            display: inline-block; padding: 18px 40px; 
            background: linear-gradient(135deg, #d4af37 0%, #b8860b 100%); 
            color: white; text-decoration: none; border-radius: 50px; 
            font-weight: bold; font-size: 1.2rem;
            border: 2px solid #fff; box-shadow: 0 10px 30px rgba(184, 134, 11, 0.4);
            white-space: nowrap; animation: pulse 2s infinite; 
        }
        @keyframes pulse { 0% { transform: scale(1); } 50% { transform: scale(1.05); } 100% { transform: scale(1); } }

        /* 4. 특징 카드 3개 (깔끔한 화이트 카드) */
        .features { display: flex; flex-wrap: wrap; justify-content: center; padding: 50px 15px; gap: 20px; }
        .card { flex: 1; min-width: 280px; max-width: 320px; text-align: center; padding: 40px 20px; border-radius: 20px; background: #fff; box-shadow: 0 10px 30px rgba(0,0,0,0.05); border: 1px solid #e0e0e0; transition: 0.3s; }
        .card:hover { transform: translateY(-5px); }
        .card i { font-size: 40px; color: #1a472a; margin-bottom: 20px; }
        .card h3 { color: #1a472a; margin: 0 0 10px; font-size: 1.4rem; }

        /* 5. 갤러리 슬라이더 (비율 완벽 고정) */
        .slider-section { padding: 60px 15px; background: #fff; text-align: center; }
        .slider-box { max-width: 700px; margin: 0 auto; position: relative; overflow: hidden; border-radius: 25px; border: 4px solid #1a472a; aspect-ratio: 16 / 9; background: #222; }
        .slide { display: none; width: 100%; height: 100%; }
        .slide img { width: 100%; height: 100%; object-fit: cover; }
        .nav-btn { position: absolute; top: 50%; transform: translateY(-50%); background: rgba(255,255,255,0.9); color: #1a472a; border: none; width: 45px; height: 45px; border-radius: 50%; cursor: pointer; z-index: 10; font-size: 22px; box-shadow: 0 4px 10px rgba(0,0,0,0.2); }
        .prev { left: 15px; } .next { right: 15px; }

        /* 6. 하단 예약 문의 (전화번호 절대 안 잘림 설계) */
        footer { padding: 80px 20px; text-align: center; background: #1a472a; color: white; border-top: 5px solid #d4af37; }
        .res-title { font-size: 1.2rem; color: #d4af37; font-weight: bold; margin-bottom: 10px; text-transform: uppercase; }
        .tel-box { 
            display: inline-block; margin-top: 20px; padding: 15px 30px; 
            border: 2px solid #d4af37; border-radius: 15px; background: rgba(255,255,255,0.05);
            width: 95%; max-width: 400px;
        }
        .tel-link { 
            font-size: clamp(1.4rem, 6vw, 2.2rem); /* 화면이 작아지면 글자도 같이 작아짐 */
            font-weight: 900; color: #fff; text-decoration: none; white-space: nowrap; 
        }
    </style>
</head>
<body>

    <header class="hero">
        <div class="hero-bg"><img src="./src/assets/panorama.jpg" onerror="this.src='https://via.placeholder.com/1200x800?text=Dragon+Hills+C.C.'"></div>
        <div class="hero-content">
            <h1>DRAGON HILLS C.C.</h1>
            <p>태국 라차부리 명문 골프장의 품격을 경험하세요</p>
            <a href="#contact" class="cta-btn">실시간 예약하기</a>
        </div>
    </header>

    <section class="features">
        <div class="card"><i class="fas fa-tree"></i><h3>프라이빗 코스</h3><p>숲으로 완전히 분리된 독보적 공간</p></div>
        <div class="card"><i class="fas fa-utensils"></i><h3>명품 한식 뷔페</h3><p>한국인 주방장이 선사하는 맛의 감동</p></div>
        <div class="card"><i class="fas fa-hotel"></i><h3>최고급 숙박</h3><p>라운딩 후 즐기는 고품격 휴식</p></div>
    </section>

    <section class="slider-section">
        <h2 style="color: #1a472a; margin-bottom: 40px; font-size: 1.8rem;">COURSE GALLERY</h2>
        <div class="slider-box">
            <div class="slide" style="display: block;"><img src="hole1.jpg" onerror="this.src='hole1.JPG';"></div>
            <div class="slide"><img src="hole2.jpg" onerror="this.src='hole2.JPG';"></div>
            <div class="slide"><img src="hole3.jpg" onerror="this.src='hole3.JPG';"></div>
            <button class="nav-btn prev" onclick="moveSlide(-1)">❮</button>
            <button class="nav-btn next" onclick="moveSlide(1)">❯</button>
        </div>
    </section>

    <footer id="contact">
        <div class="res-title">RESERVATION</div>
        <h2 style="margin: 0; font-size: 1.6rem;">실시간 예약 및 문의</h2>
        <p style="margin-top: 10px; opacity: 0.8;">현지 한국인 매니저가 친절하게 상담해 드립니다.</p>
        <div class="tel-box">
            <a href="tel:070-8098-6781" class="tel-link">📞 070-8098-6781</a>
        </div>
        <p style="margin-top: 40px; opacity: 0.5; font-size: 12px;">© 2026 Dragon Hills Golf & Country Club.</p>
    </footer>

    <script>
        let currentIdx = 0;
        function moveSlide(n) {
            let slides = document.getElementsByClassName("slide");
            if (slides.length === 0) return;
            slides[currentIdx].style.display = "none";
            currentIdx = (currentIdx + n + slides.length) % slides.length;
            slides[currentIdx].style.display = "block";
        }
    </script>
</body>
</html>
