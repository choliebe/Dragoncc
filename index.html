<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>드래곤 힐스 C.C.</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        * { box-sizing: border-box; }
        body { margin: 0; padding: 0; font-family: 'Malgun Gothic', sans-serif; line-height: 1.5; overflow-x: hidden; color: #333; }
        
        /* [1] 히어로 섹션 - 더 깊이감 있고 고급스럽게 */
        .hero { height: 70vh; min-height: 450px; position: relative; display: flex; align-items: center; justify-content: center; color: white; text-align: center; overflow: hidden; }
        .hero-bg { position: absolute; top: 0; left: 0; width: 100%; height: 100%; z-index: 1; background: #000; }
        .hero-bg img { width: 100%; height: 100%; object-fit: cover; opacity: 0.6; transform: scale(1.1); transition: 5s; }
        .hero:hover .hero-bg img { transform: scale(1); } /* 미세하게 움직이는 효과 */
        
        .hero-content { position: relative; z-index: 2; width: 100%; padding: 20px; }
        .hero-content h1 { font-size: clamp(2rem, 6vw, 3.2rem); margin: 0; font-weight: 800; letter-spacing: -1px; }
        .hero-content p { font-size: clamp(1rem, 3vw, 1.3rem); margin: 20px 0 35px; opacity: 0.9; font-weight: 300; }

        /* [2] 실시간 예약 버튼 - 금색 포인트 & 반짝임 효과 */
        .cta-btn { 
            display: inline-block; 
            padding: 18px 45px; 
            background: linear-gradient(135deg, #c5a059 0%, #a67c37 100%); /* 금색 그라데이션 */
            color: white; 
            text-decoration: none; 
            border-radius: 50px; 
            font-weight: bold; 
            font-size: 1.2rem; 
            box-shadow: 0 10px 20px rgba(0,0,0,0.3);
            border: 2px solid rgba(255,255,255,0.3);
            transition: all 0.3s ease;
            position: relative;
            overflow: hidden;
        }
        .cta-btn:hover { transform: translateY(-3px); box-shadow: 0 15px 30px rgba(0,0,0,0.4); }
        
        /* 버튼에 빛이 지나가는 효과 */
        .cta-btn::after {
            content: '';
            position: absolute;
            top: -50%; left: -50%;
            width: 200%; height: 200%;
            background: rgba(255,255,255,0.2);
            transform: rotate(45deg);
            transition: 0.5s;
            left: -150%;
        }
