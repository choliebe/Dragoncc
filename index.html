<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>드래곤 힐스 C.C.</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        /* [1] 화면 잘림 방지 설정 */
        * { box-sizing: border-box; -webkit-text-size-adjust: none; }
        body { margin: 0; padding: 0; font-family: sans-serif; line-height: 1.5; overflow-x: hidden; background: #fff; }

        /* [2] 상단 전경 섹션 */
        .hero { height: 60vh; min-height: 350px; position: relative; display: flex; align-items: center; justify-content: center; color: white; text-align: center; background: #000; padding: 0 20px; }
        .hero img { position: absolute; top: 0; left: 0; width: 100%; height: 100%; object-fit: cover; opacity: 0.5; z-index: 1; }
        .hero-content { position: relative; z-index: 2; width: 100%; max-width: 500px; }
        .hero-content h1 { font-size: clamp(1.8rem, 6vw, 2.5rem); margin: 0; font-weight: bold; }

        /* [3] 반짝이는 금색 예약 버튼 */
        .cta-btn { 
            display: inline-block; padding: 15px 30px; 
            background: linear-gradient(135deg, #d4af37 0%, #b8860b 100%); 
            color: white; text-decoration: none; border-radius: 50px; 
            font-weight: bold; margin-top: 25px; font-size: 1.1rem;
            border: 2px solid #fff; box-shadow: 0 5px 15px rgba(0,0,0,0.3);
            white-space: nowrap; /* 버튼 글자 줄바꿈 방지 */
            animation: pulse 2s infinite; 
        }
        @keyframes pulse { 0% { transform: scale(1); } 50% { transform: scale(1.03); } 100% { transform: scale(1); } }

        /* [4] 특징 카드 섹션 */
        .features { display: flex; flex-wrap: wrap; justify-content: center; padding: 40px 15px; gap: 15px; }
        .card { flex: 1; min-width: 280px; max-width: 320px; text-align: center; padding: 30px 15px; border-radius: 15px; box-shadow: 0 5px 20px rgba(0,0,0,0.05); border: 1px solid #f0f0f0; }
        .card i { font-size: 30px; color: #1a472a; margin-bottom: 15px; }

        /* [5] 슬라이더 (비율 고정) */
        .slider-section { padding: 40px 15px; background: #f9f9f9; text-align: center; }
        .slider-box { max-width: 600px; margin: 0 auto; position: relative; overflow: hidden; border-radius: 15px; aspect-ratio: 4 / 3; background: #333; }
        .slide { display: none; width: 100%; height: 100%; }
        .slide img { width: 100%; height: 100%; object-fit: cover; }
        .nav-btn { position: absolute; top: 50%; transform: translateY(-50%); background: rgba(0,0,0,0.5); color: white; border: none; width: 40px; height: 40px; border-radius: 50%; cursor: pointer; z-index: 10; font-size: 20px; }

        /* [6] 하단 예약 문의 (번호 안 잘리게 조절) */
        footer { padding: 60px 20px; text-align: center; background: #1a472a; color: white; }
        .tel-box { 
            display: inline-block; 
            margin-top: 20px; 
            padding: 12px 20px; 
            border: 2px solid #d4af37; 
            border-radius: 12px; 
            background: rgba(255,255,255,0.05);
            max-width: 100%; /* 부모 너비를 넘지 않게 함 */
        }
        .tel-link { 
            font-size: clamp(1.4rem, 5vw, 1.8rem); /* 화면 크기에 따라 번호 크기 자동 조절 */
            font-weight: bold; 
            color: #d4af37; 
            text-decoration: none; 
            white-space: nowrap; /* 번호가 두 줄로 안 잘리게 고정 */
        }
    </style>
</head>
<body>

    <header class="hero">
        <img src="./src/assets/panorama.jpg" onerror="this.src='https://via.placeholder.com/1200x800?text=Dragon+Hills+C.C.'">
        <div class="hero-content">
            <h1>DRAGON HILLS C.C.</h1>
