<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>드래곤힐스 골프클럽</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: 'Malgun Gothic', sans-serif; background: #f8f9fa; color: #333; line-height: 1.6; }
        
        /* [1] 상단 메인 */
        .hero { height: 45vh; min-height: 320px; position: relative; display: flex; align-items: center; justify-content: center; text-align: center; color: white; background: #1a472a; }
        .hero img { position: absolute; top: 0; left: 0; width: 100%; height: 100%; object-fit: cover; opacity: 0.4; z-index: 1; }
        .hero-content { position: relative; z-index: 2; width: 100%; padding: 0 20px; }
        .hero-content h1 { font-size: 2.3rem; font-weight: 900; text-shadow: 2px 2px 10px rgba(0,0,0,0.6); margin-bottom: 5px; }
        
        .cta-btn { 
            display: inline-block; padding: 18px 40px; background: #d4af37; color: white; 
            border-radius: 50px; font-weight: 800; font-size: 1.2rem; cursor: pointer; 
            border: 2px solid #fff; box-shadow: 0 5px 15px rgba(0,0,0,0.3); margin-top: 25px;
        }

        /* [2] 메뉴 카드 섹션 */
        .features { display: flex; justify-content: center; padding: 30px 10px; gap: 10px; background: white; border-bottom: 1px solid #eee; }
        .card { width: 30%; background: #f8f9fa; text-align: center; padding: 20px 10px; border-radius: 15px; cursor: pointer; border: 1px solid #eee; }
        .card i { font-size: 24px; color: #1a472a; margin-bottom: 10px; }
        .card p { font-size: 0.85rem; font-weight: bold; color: #1a472a; }

        /* [3] 코스 사진 섹션 (기본 숨김) */
        #course-gallery { display: none; padding: 40px 15px; background: #fff; text-align: center; }
        .photo-list { max-width: 600px; margin: 0 auto; display: flex; flex-direction: column; gap: 20px; }
        .photo-item { position: relative; border-radius: 15px; overflow: hidden; box-shadow: 0 5px 15px rgba(0,0,0,0.1); border: 1px solid #ddd; }
        .photo-item img { width: 100%; height: auto; display: block; }
        .hole-label { position: absolute; top: 10px; left: 10px; background: #1a472a; color: white; padding: 5px 12px; border-radius: 20px; font-size: 0.8rem; font-weight: bold; }

        /* [4] 예약 팝업창 (모달) */
        #bookingModal { 
            display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; 
            background: rgba(0,0,0,0.85); z-index: 10000; justify-content: center; align-items: center; 
        }
        .modal-content { 
            background: white; width: 90%; max-width: 400px; padding: 30px; border-radius: 20px; 
            position: relative; border: 2px solid #d4af37;
        }
        .close-btn { position: absolute; top: 15px; right: 20px; font-size: 30px; cursor: pointer; color: #aaa; line-height: 1; }
        
        .form-group { margin-bottom: 15px; text-align: left; }
        .form-group label { display: block; margin-bottom: 5px; font-weight: bold; font-size: 0.9rem; }
        .form-group input, .form-group select { width: 100%; padding: 12px; border: 1px solid #ddd; border-radius: 10px; font-size: 1rem; }
        .submit-btn { width: 100%; padding: 16px; background: #1a472a; color: white; border: none; border-radius: 12px; font-weight: 800; cursor: pointer; font-size: 1.1rem; }

        /* [5] 푸터 (전화번호) */
        footer { padding: 60px 20px; text-align: center; background: #1a472a; color: white; }
        .tel-box { 
            display: inline-flex; align-items: center; gap: 10px;
            margin: 15px auto; padding: 15px 30px; border: 2px solid #d4af37; border-radius: 50px; 
            color: #f7e08a; font-size: 1.6rem; font-weight: 900; text-decoration: none;
        }
    </style>
</head>
<body>

    <header class="hero">
        <img src="./src/assets/panorama.jpg" onerror="this.style.display='none'">
        <div class="hero-content">
            <h1>드래곤힐스 골프클럽</h1>
            <p>Ratchaburi, Thailand</p>
            <div class="cta-btn" onclick="openPop()">실시간 예약문의</div>
        </div>
    </header>

    <section class="features">
        <div class="card" onclick="toggleCourse()"><i class="fas fa-images"></i><p>Course View</p></div>
        <div class="card" onclick="openPop()"><i class="fas fa-calendar-check"></i><p>실시간예약</p></div>
        <div class="card" onclick="alert('식사 안내는 준비 중입니다.')"><i class="fas fa-utensils"></i><p>식사안내</p></div>
    </section>

    <div id="course-gallery">
        <h2 style="margin-bottom:20px; color:#1a472a;">코스 전경</h2>
        <div class="photo-list">
            <div class="photo-item"><span class="hole-label">Hole 1</span><img src="hole1.jpg" onerror="this.src='https://via.placeholder.com/600x400?text=Hole+1+Photo'"></div>
            <div class="photo-item"><span class="hole-label">Hole 2</span><img src="hole2.jpg" onerror="this.src='https://via.placeholder.com/600x400?text=Hole+2+Photo'"></div>
        </div>
    </div>

    <div id="bookingModal">
        <div class="modal-content">
            <span class="close-btn" onclick="closePop()">&times;</span>
            <h2 style="margin-bottom:20px; color:#1a472a; text-align:center; font-weight: 900;">예약 상담 신청</h2>
            <div class="form-group"><label>성함</label><input type="text" id="u_name" placeholder="대표자 성함"></div>
            <div class="form-group"><label>날짜</label><input type="date" id="u_date"></div>
            <div class="form-group">
                <label>숙박</label>
                <select id="u_stay">
                    <option value="3박">3박</option><option value="4박">4박</option>
                    <option value="5박">5박</option><option value="장박상담">기타 상담</option>
                </select>
            </div>
            <div class="form-group"><label>인원</label><input type="number" id="u_people" placeholder="명"></div>
            <button class="submit-btn" onclick="sendSMS()">문자로 정보 전송</button>
        </div>
    </div>

    <footer>
        <p>한국인 매니저 직통 상담</p>
        <a href="tel:070-8098-6781" class="tel-box">
            <i class="fas fa-phone-alt"></i> 070.8098.6781
        </a>
        <p style="margin-top:40px; opacity:0.4; font-size:11px;">© 2026 Dragon Hills Golf Club</p>
    </footer>

    <script>
        // 1. 예약 팝업 열기/닫기
        function openPop() { document.getElementById('bookingModal').style.display = 'flex'; }
        function closePop() { document.getElementById('bookingModal').style.display = 'none'; }

        // 2. 코스 갤러리 토글
        function toggleCourse() {
            var gallery = document.getElementById("course-gallery");
            if (gallery.style.display === "block") {
                gallery.style.display = "none";
            } else {
                gallery.style.display = "block";
                window.scrollTo({ top: gallery.offsetTop - 20, behavior: 'smooth' });
            }
        }

        // 3. 문자 전송
        function sendSMS() {
            var n = document.getElementById('u_name').value;
            var d = document.getElementById('u_date').value;
            var s = document.getElementById('u_stay').value;
            var p = document.getElementById('u_people').value;
            if(!n || !d || !p) { alert('항목을 모두 채워주세요.'); return; }
            var msg = "[드래곤힐스 예약신청]\n성함: " + n + "\n날짜: " + d + "\n숙박: " + s + "\n인원: " + p + "명";
            window.location.href = "sms:07080986781?body=" + encodeURIComponent(msg);
            closePop();
        }

        // 배경 클릭 시 팝업 닫기
        window.onclick = function(e) { if (e.target == document.getElementById('bookingModal')) closePop(); }
    </script>
</body>
</html>
