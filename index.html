<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>드래곤 힐스 C.C.</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <link rel="stylesheet" href="./src/style.css">
  <style>
    .slider-container { position: relative; width: 95%; max-width: 850px; margin: 20px auto; overflow: hidden; border-radius: 10px; background: #eee; min-height: 250px; }
    .slides { display: none; width: 100%; text-align: center; }
    .slides img { width: 100%; height: auto; display: block; }
    .slide-text { position: absolute; bottom: 0; width: 100%; background: rgba(0,0,0,0.6); color: white; padding: 10px; font-size: 16px; }
    .prev, .next { cursor: pointer; position: absolute; top: 50%; width: 40px; height: 40px; margin-top: -20px; color: white; background: rgba(26,71,42,0.8); border: none; border-radius: 50%; font-size: 20px; z-index: 10; display: flex; align-items: center; justify-content: center; }
    .next { right: 10px; }
    .prev { left: 10px; }
  </style>
</head>
<body>
  <nav class="top-nav">
    <a href="index.html" class="nav-logo">Dragon Hills</a>
    <span style="color:white; font-size:12px; margin-right:15px;">문의: 070-8997-3976</span>
  </nav>

  <section style="text-align: center; padding: 20px 10px;">
    <h2 style="color: #1a472a; font-size: 22px;">프라이빗 코스 (1~3번 홀)</h2>
    
    <div class="slider-container">
      <div class="slides" style="display: block;">
        <img src="hole1.jpg" onerror="this.src='hole1.JPG'; this.onerror=null;" alt="1번 홀">
        <div class="slide-text">1번 홀 (Hole 1)</div>
      </div>
      <div class="slides">
        <img src="hole2.jpg" onerror="this.src='hole2.JPG'; this.onerror=null;" alt="2번 홀">
        <div class="slide-text">2번 홀 (Hole 2)</div>
      </div>
      <div class="slides">
        <img src="hole3.jpg" onerror="this.src='hole3.JPG'; this.onerror=null;" alt="3번 홀">
        <div class="slide-text">3번 홀 (Hole 3)</div>
      </div>

      <button class="prev" onclick="plusSlides(-1)">&#10094;</button>
      <button class="next" onclick="plusSlides(1)">&#10095;</button>
    </div>
  </section>

  <script>
    let slideIndex = 1;
    function plusSlides(n) { showSlides(slideIndex += n); }
    function showSlides(n) {
      let slides = document.getElementsByClassName("slides");
      if (n > slides.length) {slideIndex = 1}    
      if (n < 1) {slideIndex = slides.length}
      for (let i = 0; i < slides.length; i++) { slides[i].style.display = "none"; }
      slides[slideIndex-1].style.display = "block";  
    }
  </script>
</body>
</html>
