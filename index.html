<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Dragon Hills Golf Club - Ratchaburi, Thailand</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        /* [1] 기본 설정 */
        * { box-sizing: border-box; -webkit-text-size-adjust: none; scroll-behavior: smooth; }
        body { margin: 0; padding: 0; font-family: 'Malgun Gothic', sans-serif; line-height: 1.6; overflow-x: hidden; background: #f8f9fa; color: #333; }

        /* [2] 상단 메인 타이틀 및 배경 */
        .hero { height: 50vh; min-height: 350px; position: relative; display: flex; align-items: center; justify-content: center; text-align: center; color: white; background: #1a472a; padding: 0 20px; }
        .hero img { position: absolute; top: 0; left: 0; width: 100%; height: 100%; object-fit: cover; opacity: 0.3; z-index: 1; }
        .hero-content { position: relative; z-index: 2; width: 100%; }
        /* 요청하신 타이틀 변경: DRAGON HILLS GOLF CLUB */
        .hero-content h1 { font-size: 2.5rem; font-weight: 900; margin: 0; text-shadow: 2px 2px 15px rgba(0,0,0,0.6); letter-spacing: -1px; text-transform: uppercase; }
        .hero-content p { font-size: 1.1rem; opacity: 0.9; margin-top: 5px; text-shadow: 1px 1px 5px rgba(0,0,0,0.5); }
        
        .cta-btn { 
            display: inline-block; padding: 15px 40px; 
            background: linear-gradient(135deg, #d4af37 0%, #b8860b 100%); 
            color: white; text-decoration: none; border-radius: 50px; 
            font-weight: 800; font-size: 1.1rem; margin-top: 25px;
            border: 2px solid #fff; box-shadow: 0 5px 20px rgba(0,0,0,0.4);
            transition: 0.3s;
        }

        /* [3] 특징 카드 섹션 */
        .features { display: flex; flex-wrap: wrap; justify-content: center; padding: 40px 15px; gap: 15px; background: #fff; border-bottom: 1px solid #eee; }
        .card { 
            width: 30%; min-width: 110px; text-align: center; padding: 20px 10px; border-radius: 15px; 
            background: #f8f9fa; box-shadow: 0 3px 10px rgba(0,0,0,0.05); border: 1px solid #eee;
            cursor: pointer; transition: 0.3s ease;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
        }
        .card:hover { transform: translateY(-5px); border-color: #d4af37; background: #fff; box-shadow: 0 10px 25px rgba(0,0,0,0.1); }
        .card i { font-size: 28px; color: #1a472a; margin-bottom: 10px; }
        .card h3 { font-size: 0.9rem; margin: 0; color: #1a472a; font-weight: bold; }

        /* [4] 코스 사진 리스트 (숨김 처리) */
        #gallery-section { display: none; padding: 60px 15px; background: #fff; text-align: center; }
        .course-title { color: #1a472a; font-size: 2rem; font-weight: 800; margin: 0 0 10px 0; position: relative; display: inline-block; }
        .course-title::after { content: ''; display: block; width: 60px; height: 4px; background: #d4af37; margin: 15px auto; border-radius: 2px; }
        
        .photo-list { max-width: 700px; margin: 0 auto; display: flex; flex-direction: column; gap: 30px; }
        .photo-item { position: relative; border-radius: 20px; overflow: hidden; box-shadow: 0 15px 35px rgba(0,0,0,0.15); border: 1px solid #ddd; background: #333; }
        .photo-item img { width: 100%; height: auto; display: block; }
        .label { position: absolute; top: 20px; left: 20px; background: linear-gradient(135deg, #1a472a 0%, #2a613c 100%); color: #f7e08a; padding: 8px 18px; border-radius: 30px; font-weight: 800; font-size: 0.9rem; z-index: 2; box-shadow: 0 4px 10px rgba(0,0,0,0.3); }

        /* [5] 하단 예약 안내 */
        footer { padding: 80px 20px; text-align: center; background: #1a472a; color: white; border-top: 5px solid #d4af37; }
        .tel-box { 
            display: flex; align-items: center; justify-content: center; 
            margin: 30px auto; padding: 18px 25px; 
            background: linear-gradient(135deg, rgba(255,255,255,0.1) 0%, rgba(255,255,255,0.05) 100%);
            border: 2px solid #d4af37; border-radius: 50px; 
            width: 90%; max-width: 360px; box-shadow: 0 10px 25px rgba(0,0,0,0.3); 
        }
        .tel-link { font-size: 1.8rem; font-weight: 900; color: #fff; text-decoration: none; display: flex; align-items: center; gap: 15px; }
        .tel-link i { font-size: 1.5rem; color: #f7e08a; }
        .copyright { margin-top: 50px; opacity: 0.5; font-size: 12px; }
    </style>
</head>
<body>

    <header class="hero">
        <img src="./src/assets/panorama.jpg" onerror="this.src='https://via.placeholder.com/1200x800/1a472a/ffffff?text=Dragon+Hills+Golf+Club'">
        <div class="hero-content">
            <h1>DRAGON HILLS GOLF CLUB</h1>
            <p>Ratchaburi, Thailand</p>
            <a href="tel:070-8098-6781" class="cta-btn">실시간 예약문의</a>
        </div>
    </header>

    <section class="features">
        <div class="card" onclick="toggleGallery()">
            <i class="fas fa-images"></i>
            <h3>Course View</h3>
        </div>
        <div class="card"><i class="fas fa-utensils"></i><h3>K-Food</h3></div>
        <div class="card"><i class="fas fa-hotel"></i><h3>Hotel</h3></div>
    </section>

    <section id="gallery-section">
        <h2 class="course-title">Course View</h2>
        <div class="photo-list">
            <div class="photo-item"><span class="label">Hole 1</span><img src="hole1.jpg" onerror="this.src='https://via.placeholder.com/700x450/333333/f7e08a?text=Hole+1+Coming+Soon'"></div>
            <div class="photo-item"><span class="label">Hole 2</span><img src="hole2.jpg" onerror="this.src='https://via.placeholder.com/700x450/333333/f7e08a?text=Hole+2+Coming+Soon'"></div>
            <div class="photo-item"><span class="label">Hole 3</span><img src="hole3.jpg" onerror="this.src='https://via.placeholder.com/700x450/333333/f7e08a?text=Hole+3+Coming+Soon'"></div>
        </div>
    </section>

    <footer id="contact">
        <h2>실시간 예약 및 문의</h2>
        <p style="opacity: 0.8;">한국인 매니저가 친절하게 상담해 드립니다.</p>
        <div class="tel-box">
            <a href="tel:070-8098-6781" class="tel-link">
                <i class="fas fa-phone-alt"></i> 070.8098.6781
            </a>
        </div>
        <p class="copyright">© 2026 Dragon Hills Golf Club. All rights reserved.</p>
    </footer>

    <script>
        function toggleGallery() {
            var section = document.getElementById("gallery-section");
            if (section.style.display === "block") {
                section.style.display = "none";
            } else {
                section.style.display = "block";
                window.scrollTo({ top: section.offsetTop - 20, behavior: 'smooth' });
            }
        }
    </script>

</body>
</html>
