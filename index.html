<html lang="ko">
<head>

  <title>드래곤 힐스 C.C. - 태국 명문 골프장</title>

  <style>
    /* 1. 기본 레이아웃 및 폰트 */
    body { margin: 0; padding: 0; font-family: 'Malgun Gothic', 'Apple SD Gothic Neo', sans-serif; line-height: 1.6; background-color: #fff; scroll-behavior: smooth; }
    
    /* 2. 사장님이 좋아하시는 첫 번째 전경 화면 (히어로 섹션) */
    .hero { height: 70vh; min-height: 400px; display: flex; align-items: center; justify-content: center; text-align: center; color: white; position: relative; background: #000; }
    .hero-bg { position: absolute; top: 0; left: 0; width: 100%; height: 100%; z-index: 1; }
    .hero-bg img { width: 100%; height: 100%; object-fit: cover; filter: brightness(0.5); }
    .hero-content { position: relative; z-index: 2; padding: 0 20px; }
    .hero-content h1 { font-size: 2.5rem; margin-bottom: 10px; font-weight: bold; text-shadow: 2px 2px 4px rgba(0,0,0,0.5); }
    .hero-content p { font-size: 1.1rem; opacity: 0.9; margin-bottom: 30px; }
    
    /* 실시간 예약하기 버튼 */
    .cta-btn { display: inline-block; padding: 15px 35px; background: #1a472a; color: white; text-decoration: none; border-radius: 30px; font-weight: bold; font-size: 1.1rem; border: 2px solid #fff; transition: 0.3s; }

    /* 3. 특징 3개 카드 섹션 (프라이빗 코스, 명품 한식, 호텔 숙박) */
    .features { display: flex; justify-content: center; padding: 50px 15px; background: #fff; flex-wrap: wrap; gap: 20px; }
    .card { width: 300px; text-align: center; padding: 30px; border-radius: 15px; box-shadow: 0 10px 20px rgba(0,0,0,0.05); border: 1px solid #f2f2f2; }
    .card i { font-size: 40px; color: #1a472a; margin-bottom: 20px; }
    .card h3 { color: #333; margin-bottom: 15px; }

    /* 4. [핵심] 갤러리 슬라이더 */
    .gallery-section { padding: 50px 15px; background: #f9f9f9; text-align: center; }
    .gallery-section h2 { color: #1a472a; margin-bottom: 30px; }
    .slider-box { max-width: 800px; margin: 0 auto; position: relative; overflow: hidden; border-radius: 15px; box-shadow: 0 10px 30px rgba(0,0,0,0.2); background: #eee; }
    .slide { display: none; width: 100%; }
    .slide img { width: 100%; height: auto; min-height: 280px; display: block; object-fit: cover; }
    .slide-text { position: absolute; bottom: 0; width: 100%; background: rgba(0,0,0,0.7); color: white; padding: 12px 0; font-size: 16px; }
