<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>드래곤 힐스 C.C. - 예약 및 코스 안내</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <link rel="stylesheet" href="./src/style.css">
  <style>
    /* 슬라이더 디자인 */
    .slider-container { position: relative; width: 95%; max-width: 850px; margin: 20px auto; overflow: hidden; border-radius: 10px; background: #000; box-shadow: 0 5px 15px rgba(0,0,0,0.3); }
    .slides { display: none; width: 100%; text-align: center; }
    .slides img { width: 100%; height: auto; min-height: 250px; max-height: 500px; object-fit: cover; display: block; }
    .slide-text { position: absolute; bottom: 0; left: 0; right: 0; background: rgba(0,0,0,0.7); color: white; padding: 12px; font-size: 16px; font-weight: 500; }
    .prev, .next { cursor: pointer; position: absolute; top: 50%; width: 44px; height: 44px; margin-top: -22px; color: white; background: rgba(26,71,42,0.8); border: none; border-radius: 50%; font-size: 20px; display: flex; align-items: center; justify-content: center; z-index: 10; }
    .next { right: 10px; }
    .prev { left: 10px; }

    /* 예약 섹션 스타일 보강 */
    .reservation-section { background: #f4f4f4; padding: 40px 15px; border-radius: 10px; margin: 20px 0; }
    .reservation-container h2 { color: #1a472a; margin-bottom: 20px; font-size: 24px; }
    .form-group { margin-bottom: 15px; text-align: left; }
    .form-group label { display: block; margin-bottom: 5px; font-weight: bold; }
    .form-group input, .form-group select { width: 100%; padding: 12px; border: 1px solid #ddd; border-radius: 5px; font-size: 16px; }
    .submit-btn { width: 100%; padding: 15px; background: #1a472a; color: white; border: none; border-radius: 5px; font-size: 18px; font-weight: bold; cursor: pointer; }
  </style>
</head>
<body>
  <nav class="top-nav">
    <a href="index.html" class="nav-logo">Dragon Hills</a>
    <span style="color:white; font-size:12px; margin-right:15px;">문의: 070-8997-3976</span>
  </nav>

  <section style="text-align: center; padding: 20px 10px;">
    <h2 style="color: #1a472a; font-size: 24px; margin-bottom: 15px;">프라이빗 코스 (1~3번 홀)</h2>
    <div class="slider-container">
      <div class="slides" style="display: block;">
        <img src="hole1.jpg" onerror="this.src='hole1.JPG'; this.onerror=null;">
        <div class="slide-text">1번 홀 (Hole 1)</div>
      </div>
      <div class="slides">
        <img src="hole2.jpg" onerror="this.src='hole2.JPG'; this.onerror=null;">
        <div class="slide-text">2번 홀 (Hole 2)</div>
      </div>
      <div class="slides">
        <img src="hole3.jpg" onerror="this.src='hole3.JPG'; this.onerror=null;">
        <div class="slide-text">3번 홀 (Hole 3)</div>
      </div>
      <button class="prev" onclick="plusSlides(-1)">&#10094;</button>
      <button class="next" onclick="plusSlides(1)">&#10095;</button>
    </div>
  </section>

  <hr style="border: 0; height: 1px; background: #eee; margin: 40px 0;">

  <section id="reservation" class="reservation-section">
    <div class="reservation-container" style="max-width: 600px; margin: 0 auto; text-align: center;">
      <h2>예약 및 견적 문의</h2>
      <form id="reservationForm">
        <div class="form-group">
          <label>성함</label>
          <input type="text" id="guestName" placeholder="예약자 성함" required>
        </div>
        <div class="form-group">
          <label>연락처</label>
          <input type="tel" id="guestPhone" placeholder="010-0000-0000" required>
        </div>
        <div class="form-group">
          <label>숙박 인원</label>
          <select id="guestCount" required>
            <option value="">인원을 선택하세요</option>
            <option value="1">1명</option>
            <option value="2">2명</option>
            <option value="3">3명</option>
            <option value="4">4명 (1팀)</option>
            <option value="5">단체(별도문의)</option>
          </select>
        </div>
        <button type="submit" class="submit-btn">견적 및 가능 일정 확인하기</button>
      </form>
      <p style="margin-top: 15px; font-size: 14px; color: #666;">문의전화: 070-8997-3976</p>
    </div>
  </section>

  <footer style="background: #1a472a; color: white; padding: 30px 15px; text-align: center; margin-top: 50px;">
    <p>Dragon Hills C.C. | Ratchaburi, Thailand</p>
    <p style="font-size: 12px; opacity: 0.8; margin-top: 10px;">&copy; 2026 Dragon Hills Golf & Country Club.</p>
  </footer>

  <script>
    let slideIndex = 1;
    function plusSlides(n) { showSlides(slideIndex += n); }
    function showSlides(n) {
      let slides = document.getElementsByClassName("slides");
      if (n > slides.length) {slideIndex = 1}    
      if (n < 1) {slideIndex = slides.length}
      for (let i = 0; i < slides.length; i++) { slides[i].style.display = "none"; }
      slides[slideIndex-1].style.display = "block";  
    }
  </script>
</body>
</html>
