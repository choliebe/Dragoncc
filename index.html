    <title>Dragon Hills Golf Club</title>

        /* [1] 기본 레이아웃 */
        * { box-sizing: border-box; }
        body { margin: 0; padding: 0; font-family: 'Malgun Gothic', sans-serif; background: #f8f9fa; line-height: 1.6; }

        .hero img { position: absolute; top: 0; left: 0; width: 100%; height: 100%; object-fit: cover; opacity: 0.3; z-index: 1; }
        .hero-content { position: relative; z-index: 2; width: 100%; padding: 0 20px; }
        
        /* [2] 메인 버튼 */
        .cta-btn {

        .features { display: flex; justify-content: center; padding: 30px 10px; gap: 10px; background: white; }

        .card i { font-size: 24px; color: #1a472a; margin-bottom: 8px; }
        .card p { font-size: 0.85rem; font-weight: bold; margin: 0; color: #1a472a; }
