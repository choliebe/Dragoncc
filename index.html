<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>드래곤 힐스 C.C. - 태국 명문 골프장</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <style>
    /* 1. 기본 스타일 및 배경 (이미지 디자인 복구) */
    body { margin: 0; padding: 0; font-family: 'Malgun Gothic', sans-serif; line-height: 1.6; scroll-behavior: smooth; }
    .hero { height: 75vh; display: flex; align-items: center; justify-content: center; text-align: center; color: white; position: relative; }
    .hero-bg { position: absolute; top: 0; left: 0; width: 100%; height: 100%; z-index: -1; background: #000; }
    .hero-bg img { width: 100%; height: 100%; object-fit: cover; filter: brightness(0.5); }
    .hero-content h1 { font-size: 2.5rem; margin-bottom: 10px; font-weight: bold; }
    .hero-content p { font-size: 1.1rem; opacity: 0.9; margin-bottom: 25px; }
    
    /* 버튼 클릭 시 이동하도록 설정된 클래스 */
    .cta-btn { display: inline-block; padding: 15px 35px; background: #1a472a; color: white; text-decoration: none; border-radius: 30px; font-weight: bold; transition: 0.3s; cursor: pointer; border: none; }
    .cta-btn:hover { background: #143620; transform: scale(1.05); }

    /* 2. 3가지 특징 카드 섹션 */
    .features { display: flex; justify-content: space-around; padding: 50px 20px; background: white; flex-wrap: wrap; gap: 20px; }
    .feature-card { width: 30%; min-width: 280px; text-align: center; padding: 30px; border-radius: 15px; box-shadow: 0 5px 20px rgba(0,0,0,0.05); border: 1px solid #f2f2f2; }
    .feature-icon { font-size: 35px; color: #1a472a; margin-bottom: 15px; }

    /* 3. 갤러리 슬라이더 섹션 */
    .gallery-section { padding: 60px 20px; background: #f9f9f9; text-align: center; }
    .slider-container { position: relative; max-width: 800px; margin: 30px auto; overflow: hidden; border-radius: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.2); }
    .slides { display: none; width: 100%; }
    .slides img { width: 100%; height: auto; min-height: 300px; max-height: 500px; object-fit: cover; display: block; }
    .slide-text { position: absolute; bottom: 0; width: 100%; background: rgba(0,0,0,0.75); color: white; padding: 15px 0; font-size: 18px; font-weight: bold; }
