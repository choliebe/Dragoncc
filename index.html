<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>드래곤 힐스 C.C.</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        /* [1] 기본 설정 */
        * { box-sizing: border-box; -webkit-text-size-adjust: none; scroll-behavior: smooth; }
        body { margin: 0; padding: 0; font-family: 'Malgun Gothic', sans-serif; line-height: 1.6; overflow-x: hidden; background: #f8f9fa; }

        /* [2] 상단 전경 */
        .hero { height: 60vh; min-height: 400px; position: relative; display: flex; align-items: center; justify-content: center; text-align: center; color: white; background: #1a472a; padding: 0 20px; }
        .hero img { position: absolute; top: 0; left: 0; width: 100%; height: 100%; object-fit: cover; opacity: 0.5; z-index: 1; }
        .hero-content { position: relative; z-index: 2; width: 100%; }
        .hero-content h1 { font-size: 2.2rem; font-weight: 800; margin: 0; text-shadow: 2px 2px 10px rgba(0,0,0,0.5); }
        
        .cta-btn { 
            display: inline-block; padding: 18px 40px; 
            background: linear-gradient(135deg, #d4af37 0%, #b8860b 100%); 
            color: white; text-decoration: none; border-radius: 50px; 
            font-weight: 800; font-size: 1.2rem; margin-top: 25px;
            border: 2px solid #fff; box-shadow: 0 5px 20px rgba(0,0,0,0.4);
            animation: bounce 2s infinite; 
        }
        @keyframes bounce { 0%, 100% { transform: scale(1); } 50% { transform: scale(1.05); } }

        /* [3] 특징 카드 */
        .features { display: flex; flex-wrap: wrap; justify-content: center; padding: 40px 15px; gap: 15px; }
        .card { 
            width: 100%; max-width: 320px; text-align: center; padding: 30px 15px; border-radius: 15px; 
            background: #fff; box-shadow: 0 5px 15px rgba(0,0,0,0.05); border: 1px solid #eee; 
            cursor: pointer; transition: 0.3s;
        }
        .card:hover { transform: translateY(-5px); border-color: #d4af37; }
        .card i { font-size: 35px; color: #1a472a; margin-bottom: 15px; }

        /* [4] 클릭 시 나타나는 코스 사진 리스트 */
        #course-photos { display: none; padding: 20px 15px; text-align: center; background: #fff; }
        .photo-grid { max-width: 600px; margin: 0 auto; display: flex; flex-direction: column; gap: 20px; }
        .photo-item { position: relative; border-radius: 15px; overflow: hidden; box-shadow: 0 5px 15px rgba(0,0,0,0.1); }
        .photo-item img { width: 100%; height: auto; display: block; }
        .photo-item .label { position: absolute; top: 15px; left: 15px; background: rgba(26, 71, 42, 0.8); color: #f7e08a; padding: 5px 15px; border-radius: 20px; font-weight: bold; font-size: 0.9rem; }

        /* [5] 하단 예약 안내 */
        footer { padding: 60px 20px; text-align: center; background: #1a472a; color: white; border-top: 4px solid #d4af37; }
