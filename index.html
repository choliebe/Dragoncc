<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>드래곤힐스 골프클럽</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        /* [1] 기본 초기화 */
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: 'Malgun Gothic', sans-serif; background: #f4f7f4; color: #333; line-height: 1.6; overflow-x: hidden; }

        /* [2] 상단 메인 섹션 */
        .hero { height: 45vh; min-height: 320px; position: relative; display: flex; align-items: center; justify-content: center; text-align: center; color: white; background: #1a472a; }
        .hero img { position: absolute; top: 0; left: 0; width: 100%; height: 100%; object-fit: cover; opacity: 0.4; z-index: 1; }
        .hero-content { position: relative; z-index: 2; width: 100%; padding: 0 20px; }
        
        /* 메인 타이틀 한글화 */
        .hero-content h1 { font-size: 2.3rem; font-weight: 900; text-shadow: 2px 2px 10px rgba(0,0,0,0.7); margin-bottom: 8px; }
        .hero-content p { font-size: 1.1rem; opacity: 0.9; }

        .cta-btn { 
            display: inline-block; padding: 18px 45px; background: #d4af37; color: white; 
            border-radius: 50px; font-weight: 800; font-size: 1.2rem; cursor: pointer; 
            border: 2px solid #fff; box-shadow: 0 5px 15px rgba(0,0,0,0.3); margin-top: 25px;
            transition: 0.2s; text-decoration: none;
        }

        /* [3] 메뉴 카드 */
        .features { display: flex; justify-content: center; padding: 30px 10px; gap: 10px; background: white; border-bottom: 1px solid #eee; }
        .card { width: 30%; background: #fdfdfd; text-align: center; padding: 18px 5px; border-radius: 15px; cursor: pointer; border: 1px solid #eee; box-shadow: 0 2px 5px rgba(0,0,0,0.05); }
        .card i { font-size: 26px; color: #1a472a; margin-bottom: 8px; }
        .card p { font-size: 0.85rem; font-weight: bold; color: #1a472a; }

        /* [4] 팝업창 (모달) */
        #bookingModal { 
            display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; 
            background: rgba(0,0,0,0.85); z-index: 10000; justify-content: center; align-items: center; 
        }
        .modal-content { 
            background: white; width: 90%; max-width: 400px; padding: 30px; border-radius: 20px; 
            position: relative; border: 2px solid #d4af37;
        }
        .close-btn { position: absolute; top: 15px; right: 20px; font-size: 30px; cursor: pointer; color: #999; line-height: 1; }
        
        .form-group { margin-bottom: 15px; text-align: left; }
        .form-group label { display: block; margin-bottom: 5px; font-weight: bold; font-size: 0.9rem; color: #555; }
        .form-group input, .form-group select { width: 100%; padding: 12px; border: 10px; border: 1px solid #ddd; border-radius: 10px; font-size: 1rem; outline: none; }
        
        .submit-btn { width: 100%; padding: 16px; background: #1a472a; color: white; border: none; border-radius: 10px; font-weight: 800; cursor: pointer; font-size: 1.1rem; margin-top: 10px; }

        /* [5] 하단 푸터 (전화번호 고정) */
        footer { padding: 60px 20px; text-align: center; background: #1a472a; color: white; }
        .tel-label { font-size: 1rem; opacity: 0.8; margin-bottom: 15px; }
        .tel-box { 
            display: inline-flex; align-items: center; gap: 12px;
            padding: 15px 30px; border: 2px solid #d4af37; border-radius: 50px; 
            color: #f7e08a; font-size: 1.6rem; font-weight: 900; text-decoration: none;
            background: rgba(255,255,255,0.05);
        }
    </style>
</head>
<body>

    <header class="hero">
        <img src="./src/assets/panorama.jpg" onerror="this.style.display='none'">
        <div class="hero-content">
            <h1>드래곤힐스 골프클럽</h1>
            <p>Ratchaburi, Thailand</p>
            <div class="cta-btn" onclick="openModal()">실시간 예약문의</div>
        </div>
    </header>

    <section class="features">
        <div class="card" onclick="openModal()"><i class="fas fa-calendar-check"></i><p>실시간예약</p></div>
        <div class="card" onclick="alert('식사 안내는 준비 중입니다.')"><i class="fas fa-utensils"></i><p>식사안내</p></div>
        <div class="card" onclick="alert('숙소 안내는 준비 중입니다.')"><i class="fas fa-hotel"></i><p>숙소안내</p></div>
    </section>

    <div id="bookingModal">
        <div class="modal-content">
            <span class="close-btn" onclick="closeModal()">&times;</span>
            <h2 style="margin-bottom:20px; color:#1a472a; text-align:center; font-weight: 900;">예약 상담 신청</h2>
            
            <div class="form-group"><label>대표자 성함</label><input type="text" id="u_name" placeholder="성함을 입력하세요"></div>
            <div class="form-group"><label>출발 날짜</label><input type="date" id="u_date"></div>
            <div class="form-group">
                <label>숙박 기간</label>
                <select id="u_stay">
                    <option value="3박">3박</option>
                    <option value="4박">4박</option>
                    <option value="5박">5박</option>
                    <option value="기타상담">기타 (상담)</option>
                </select>
            </div>
            <div class="form-group"><label>인원 (명)</label><input type="number" id="u_people" placeholder="숫자만 입력"></div>
            
            <button class="submit-btn" onclick="sendReservation()">문자로 예약정보 전송</button>
        </div>
    </div>

    <footer>
        <p class="tel-label">한국인 매니저 직통 상담</p>
        <a href="tel:070-8098-6781" class="tel-box">
            <i class="fas fa-phone-alt"></i> 070.8098.6781
        </a>
        <p style="margin-top:40px; opacity:0.4; font-size:11px;">© 2026 Dragon Hills Golf Club. All rights reserved.</p>
    </footer>

    <script>
        // 1. 팝업 열기
        function openModal() {
            document.getElementById('bookingModal').style.display = 'flex';
            document.body.style.overflow = 'hidden'; // 뒤에 스크롤 안되게 고정
        }

        // 2
