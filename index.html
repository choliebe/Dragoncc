<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>드래곤 힐스 C.C. - 태국 명문 골프장</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        body { margin: 0; padding: 0; font-family: 'Malgun Gothic', sans-serif; line-height: 1.6; scroll-behavior: smooth; }
        
        /* 1. 상단 배경 전경 (사장님이 좋아하시는 스타일) */
        .hero { height: 65vh; position: relative; display: flex; align-items: center; justify-content: center; color: white; text-align: center; background: #000; }
        .hero img { position: absolute; top: 0; left: 0; width: 100%; height: 100%; object-fit: cover; opacity: 0.5; z-index: 1; }
        .hero-content { position: relative; z-index: 2; padding: 20px; }
        .hero-content h1 { font-size: 2.5rem; margin-bottom: 10px; }
        .cta-btn { display: inline-block; padding: 15px 35px; background: #c5a059; color: white; text-decoration: none; border-radius: 30px; font-weight: bold; margin-top: 20px; border: none; font-size: 1.1rem; }

        /* 2. 특징 카드 3개 */
        .features { display: flex; flex-wrap: wrap; justify-content: center; padding: 50px 10px; gap: 25px; background: #fff; }
        .card { width: 300px; text-align: center; padding: 35px 20px; border-radius: 15px; box-shadow: 0 10px 25px rgba(0,0,0,0.05); border: 1px solid #f0f0f0; }
        .card i { font-size: 40px; color: #1a472a; margin-bottom: 20px; }
        .card h3 { color: #333; margin-bottom: 15px; }

        /* 3. 코스 갤러리 슬라이더 */
        .slider-section { padding: 50px 15px; background: #f9f9f9; text-align: center; }
        .slider-box { max-width: 800px; margin: 0 auto; position: relative; overflow: hidden; border-radius: 20px; background: #eee; box-shadow: 0 10px 30px rgba(0,0,0,0.15); }
        .slide { display: none; width: 100%; }
        .slide img { width: 100%; height: auto; display: block; min-height: 280px; object-fit: cover; }
        .slide-text { position: absolute; bottom: 0; width: 100%; background: rgba(0,0,0,0.7); color: white; padding: 12px 0; font-size: 16px; font-weight: bold; }
        .nav-btn { position: absolute; top: 50%; transform: translateY(-50%); background: rgba(0,0,0,0.5); color: white; border: none; width: 44px; height: 44px; border-radius: 50%; cursor: pointer; font-size: 20px; display: flex; align-items: center; justify-content: center; z-index: 10; }
        .prev { left: 15px; } .next { right: 15px; }

        /* 4. 하단 예약 문의 (번호 수정 완료) */
        footer { padding: 80px 20px; text-align: center; background: #1a472a; color: white; }
        .tel-link { font-size: 1.6rem; font-weight: bold; color: #c5a059; text-decoration: none; display: block; margin-top: 15px; }
    </style>
</head>
<body>

    <header class="hero">
        <img src="./src/assets/panorama.jpg" onerror="this.src='https://via.placeholder.com/1200x800?text=Dragon+Hills+C.C.'">
        <div class="hero-content">
            <h1>드래곤 힐스 C.C.</h1>
            <p>태국 라차부리의 완벽한 골
