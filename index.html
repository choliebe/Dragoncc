<!DOCTYPE html>
<html lang="ko">
<head>

    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        /* [1] 화면 잘림 방지 및 기본 설정 */
        * { box-sizing: border-box; -webkit-text-size-adjust: none; }
        body { margin: 0; padding: 0; font-family: 'Malgun Gothic', sans-serif; background: #000; color: #fff; overflow-x: hidden; }

        /* [2] 히어로 전경 (배경을 어둡게 해서 글자를 돋보이게) */
        .hero { height: 60vh; position: relative; display: flex; align-items: center; justify-content: center; text-align: center; padding: 0 20px; }
        .hero img { position: absolute; top: 0; left: 0; width: 100%; height: 100%; object-fit: cover; opacity: 0.4; z-index: 1; }
        .hero-content { position: relative; z-index: 2; width: 100%; }
        .hero-content h1 { font-size: clamp(1.8rem, 7vw, 3rem); margin: 0; color: #d4af37; font-weight: 900; }

        /* [3] 반짝이는 금색 예약 버튼 */
        .cta-btn { 
            display: inline-block; padding: 15px 35px; 
            background: linear-gradient(135deg, #d4af37 0%, #b8860b 100%); 
            color: white; text-decoration: none; border-radius: 50px; 
            font-weight: bold; margin-top: 25px; font-size: 1.1rem;
            border: 2px solid #fff; box-shadow: 0 0 20px rgba(212, 175, 55, 0.4);
            white-space: nowrap; animation: pulse 2s infinite; 
        }
        @keyframes pulse { 0% { transform: scale(1); } 50% { transform: scale(1.05); } 100% { transform: scale(1); } }

        /* [4] 특징 카드 (검정 배경에 흰 글씨로 변경) */
        .features { display: flex; flex-wrap: wrap; justify-content: center; padding: 50px 15px; gap: 20px; background: #111; }
        .card { flex: 1; min-width: 280px; max-width: 320px; text-align: center; padding: 30px; border-radius: 15px; border: 1px solid #333; }
        .card i { font-size: 35px; color: #d4af37; margin-bottom: 15px; }

        /* [5] 슬라이더 (비율 유지) */
        .slider-section { padding: 50px 15px; background: #000; text-align: center; }
        .slider-box { max-width: 650px; margin: 0 auto; position: relative; overflow: hidden; border-radius: 20px; border: 2px solid #333; aspect-ratio: 4 / 3; }
        .slide { display: none; width: 100%; height: 100%; }
        .slide img { width: 100%; height: 100%; object-fit: cover; }
        .nav-btn { position: absolute; top: 50%; transform: translateY(-50%); background: rgba(212, 175, 55, 0.8); color: black; border: none; width: 45px; height: 45px; border-radius: 50%; cursor: pointer; z-index: 10; font-weight: bold; }
