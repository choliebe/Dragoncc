<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>드래곤 힐스 C.C.</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        body { margin: 0; padding: 0; font-family: 'Malgun Gothic', sans-serif; line-height: 1.6; scroll-behavior: smooth; }
        .hero { height: 65vh; position: relative; display: flex; align-items: center; justify-content: center; color: white; text-align: center; background: #000; }
        .hero img { position: absolute; top: 0; left: 0; width: 100%; height: 100%; object-fit: cover; opacity: 0.5; z-index: 1; }
        .hero-content { position: relative; z-index: 2; padding: 20px; }
        .cta-btn { display: inline-block; padding: 15px 35px; background: #c5a059; color: white; text-decoration: none; border-radius: 30px; font-weight: bold; margin-top: 20px; font-size: 1.1rem; }

        .features { display: flex; flex-wrap: wrap; justify-content: center; padding: 50px 10px; gap: 25px; background: #fff; }
        .card { width: 300px; text-align: center; padding: 35px 20px; border-radius: 15px; box-shadow: 0 10px 25px rgba(0,0,0,0.05); border: 1px solid #f0f0f0; }
        .card i { font-size: 40px; color: #1a472a; margin-bottom: 20px; }

        .slider-section { padding: 50px 15px; background: #f9f9f9; text-align: center; }
        .slider-box { max-width: 800px; margin: 0 auto; position: relative; overflow: hidden; border-radius: 20px; background: #eee; box-shadow: 0 10px 30px rgba(0,0,0,0.15); }
        .slide { display: none; width: 100%; }
        .slide img { width: 100%; height: auto; display: block; min-height: 280px; object-fit: cover; }
        .nav-btn { position: absolute; top: 50%; transform: translateY(-50%); background: rgba(0,0,0,0.5); color: white; border: none; width: 44px; height: 44px; border-radius: 50%; cursor: pointer; font-size: 20px; z-index: 10; display: flex; align-items: center; justify-content: center; }
        .prev { left: 15px; } .next { right: 15px; }

        footer { padding: 80px 20px; text-align: center; background: #1a472a; color: white; }
        .tel-link { font-size: 1.8rem; font-weight: bold; color: #c5a059; text-decoration: none; display: block; margin-top: 15px; }
    </style>
</head>
<body>

    <header class="hero">
        <img src="./src/assets/panorama.jpg" onerror="this.src='https://via.placeholder.com/1200x800?text=Dragon+Hills+C.C.'">
        <div class="hero-content">
            <h1>드래곤 힐스 C.C.</h1>
            <p>태국 라차부리의 완벽한 골프 파라다이스</p>
            <a href="#contact" class="cta-btn">실시간 예약하기</a>
        </div>
    </header>

    <section class="features">
        <div class="card"><i class="fas fa-tree"></i><h3>프라이빗 코스</h3><p>독보적인 집중력을 제공합니다.</p></div>
        <div class="card"><i class="fas fa-utensils"></i><h3>명품 한식 뷔페</h3><p>한국인 주방장이 선사하는 건강식.</p></div>
        <div class="card"><i class="fas fa-hotel"></i><h3>최고급 숙박</h3><p>편안한 휴식을 약속합니다.</p></div>
    </section>

    <section class="slider-section">
        <h2>코스 갤러리</h2>
        <div class="slider-box">
            <div class="slide" style="display: block;"><img src="hole1.jpg" onerror="this.src='hole1.JPG';"></div>
            <div class="slide"><img src="hole2.jpg" onerror="this.src='hole2.JPG';"></div>
            <div class="slide"><img src="hole3.jpg" onerror="this.src='hole3.JPG';"></div>
            <button class="nav-btn prev" onclick="moveSlide(-1)">❮</button>
            <button class="nav-btn next" onclick="moveSlide(1)">❯</button>
        </div>
    </section>

    <footer id="contact">
        <h2>실시간 예약 및 견적 문의</h2>
        <p>태국 현지 한국인 직원이 친절히 상담해 드립니다.</p>
        <a href="tel:070-8098-6781" class="tel-link">📞 070-8098-6781</a>
        <p style="margin-top: 30px; opacity: 0.7; font-size: 13px;">© 2026 Dragon Hills Golf & Country Club.</p>
    </footer>

    <script>
        let currentIdx = 0;
        function moveSlide(n) {
            let slides = document.getElementsByClassName("slide");
            slides[currentIdx].style.display = "none";
            currentIdx = (currentIdx + n + slides.length) % slides.length;
            slides[currentIdx].style.display = "block";
        }
    </script>
</body>
</html>
