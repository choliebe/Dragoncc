<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Dragon Hills Golf Club - Thailand</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        /* [1] 기본 설정 */
        * { box-sizing: border-box; -webkit-text-size-adjust: none; }
        body { margin: 0; padding: 0; font-family: 'Malgun Gothic', sans-serif; line-height: 1.6; background: #f8f9fa; color: #333; }

        /* [2] 상단 메인 타이틀 */
        .hero { height: 60vh; min-height: 400px; position: relative; display: flex; align-items: center; justify-content: center; text-align: center; color: white; background: #1a472a; padding: 0 20px; }
        .hero img { position: absolute; top: 0; left: 0; width: 100%; height: 100%; object-fit: cover; opacity: 0.3; z-index: 1; }
        .hero-content { position: relative; z-index: 2; width: 100%; }
        .hero-content h1 { font-size: 2.6rem; font-weight: 900; margin: 0; text-shadow: 2px 2px 15px rgba(0,0,0,0.6); text-transform: uppercase; letter-spacing: -1px; }
        .hero-content p { font-size: 1.2rem; margin-top: 10px; opacity: 0.9; }
        
        /* 버튼 클릭 이벤트 연결 확인 */
        .cta-btn { 
            display: inline-block; padding: 18px 45px; 
            background: linear-gradient(135deg, #d4af37 0%, #b8860b 100%); 
            color: white; text-decoration: none; border-radius: 50px; 
            font-weight: 800; font-size: 1.2rem; margin-top: 30px;
            border: 2px solid #fff; box-shadow: 0 8px 25px rgba(0,0,0,0.4);
            cursor: pointer; transition: 0.3s;
        }
        .cta-btn:hover { transform: scale(1.05); }
        .cta-btn:active { transform: scale(0.95); }

        /* [3] 특징 카드 */
        .features { display: flex; flex-wrap: wrap; justify-content: center; padding: 40px 15px; gap: 15px; background: #fff; }
        .card { 
            width: 30%; min-width: 110px; text-align: center; padding: 20px 10px; border-radius: 15px; 
            background: #f8f9fa; box-shadow: 0 3px 10px rgba(0,0,0,0.05); border: 1px solid #eee; cursor: pointer;
        }
        .card i { font-size: 28px; color: #1a472a; margin-bottom: 10px; }
        .card h3 { font-size: 0.85rem; margin: 0; color: #1a472a; font-weight: bold; }

        /* [4] 코스 뷰 사진 섹션 (기본 숨김) */
        #gallery-section { display: none; padding: 60px 15px; background: #fff; text-align: center; border-top: 1px solid #eee; }
        .photo-list { max-width: 700px; margin: 0 auto; display: flex; flex-direction: column; gap: 25px; }
        .photo-item { position: relative; border-radius: 20px; overflow: hidden; box-shadow: 0 10px 20px rgba(0,0,0,0.1); border: 1px solid #ddd; }
        .photo-item img { width: 100%; height: auto; display: block; }

        /* [5] 예약 팝업창 (모달) 레이어 */
        .modal-overlay { 
            display: none; /* 초기값 숨김 */
            position: fixed; top: 0; left: 0; width: 100%; height: 100%; 
            background: rgba(0,0,0,0.85); z-index: 9999; 
            justify-content: center; align-items: center; padding: 20px;
        }
        .booking-modal { 
            background: white; width: 100%; max-width: 450px; padding: 35px 25px; border-radius: 30px; 
            position: relative; box-shadow: 0 20px 60px rgba(0,0,0,0.5); border: 2px solid #d4af37;
        }
        .close-modal { position: absolute; top: 15px; right: 20px; font-size: 30px; color: #bbb; cursor: pointer; border: none; background: none; line-height: 1; }
        .booking-modal h2 { color: #1a472a; margin: 0 0 25px 0; font-weight: 900; text-align: center; font-size: 1.8rem; }
        
        .form-group { text-align: left; margin-bottom: 18px; }
        .form-group label { display: block; font-size: 0.95rem; font-weight: bold; margin-bottom: 6px; color: #444; }
        .form-group input, .form-group select { width: 100%; padding: 14px; border: 1px solid #ccc; border-radius: 12px; font-size: 1rem; outline: none; transition: 0.2s; }
        .form-group input:focus { border-color: #d4af37; box-shadow: 0 0 5px rgba(212, 175, 55, 0.3); }
        
        .submit-btn { width: 100%; padding: 16px; background: #1a472a; color: white; border: none; border-radius: 12px; font-weight: 800; font-size: 1.15rem; cursor: pointer; margin-top: 10px; }
        .kakao-link { display: block; text-align: center; margin-top: 15px; color: #3c1e1e; background: #fee500; padding: 16px; border-radius: 12px; font-weight: 800; text-decoration: none; font-size: 1.15rem; }

        /* [6] 하단 푸터 */
        footer { padding: 60px 20px; text-align: center; background: #1a472a; color: white; border-top: 5px solid #d4af37; }
        .tel-link { font-size: 1.8rem; font-weight: 900; color: #f7e08a; text-decoration: none; display: flex; align-items: center; justify-content: center; gap: 15px; margin-top: 20px; }
    </style>
</head>

    <header class="hero">
        <img src="./src/assets/panorama.jpg" onerror="this.src='https://via.placeholder.com/1200x800/1a472a/ffffff?text=Dragon+Hills+Golf+Club'">
        <div class="hero-content">
            <h1>DRAGON HILLS GOLF CLUB</h1>

        <div class="card" onclick="openBooking()"><i class="fas fa-hotel"></i><h3>Hotel</h3></div>

        <div class="photo-list">
            <div class="photo-item"><img src="hole1.jpg" onerror="this.src='https://via.placeholder.com/700x450?text=Hole+1'"></div>

    </section>
