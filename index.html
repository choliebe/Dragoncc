<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>드래곤 힐스 C.C. - 예약 및 코스</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <style>
    body { margin: 0; font-family: 'Malgun Gothic', sans-serif; line-height: 1.6; }
    .top-nav { background: #343a40; color: white; padding: 15px; display: flex; justify-content: space-between; align-items: center; position: sticky; top: 0; z-index: 1000; }
    .nav-logo { font-size: 20px; font-weight: bold; color: white; text-decoration: none; }
    
    /* 슬라이더 영역 */
    .slider-container { position: relative; width: 95%; max-width: 800px; margin: 20px auto; overflow: hidden; border-radius: 10px; background: #eee; min-height: 250px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); }
    .slides { display: none; width: 100%; text-align: center; }
    .slides img { width: 100%; height: auto; min-height: 250px; object-fit: cover; display: block; }
    .slide-text { position: absolute; bottom: 0; width: 100%; background: rgba(0,0,0,0.7); color: white; padding: 10px 0; font-size: 16px; }
    
    /* 화살표 */
    .prev, .next { cursor: pointer; position: absolute; top: 50%; width: 44px; height: 44px; margin-top: -22px; color: white; background: rgba(26,71,42,0.8); border: none; border-radius: 50%; font-size: 20px; display: flex; align-items: center; justify-content: center; z-index: 10; }
    .next { right: 10px; }
    .prev { left: 10px; }

    /* 예약 양식 영역 */
    .reservation-section { padding: 40px 20px; background: #f8f9fa; text-align: center; }
    .res-box { max-width: 500px; margin: 0 auto; background: white; padding: 30px; border-radius: 15px; box-shadow: 0 5px 15px rgba(0,0,0,0.1); }
    .form-group { margin-bottom: 20px; text-align: left; }
    .form-group label { display: block; margin-bottom: 8px; font-weight: bold; color: #333; }
    .form-group input, .form-group select { width: 100%; padding: 12px; border: 1px solid #ddd; border-radius: 6px; box-sizing: border-box; font-size: 16px; }
    .submit-btn { width: 100%; padding: 15px; background: #1a472a; color: white; border: none; border-radius: 6px; font-size: 18px; font-weight: bold; cursor: pointer; }
  </style>
</head>
<body>

  <nav class="top-nav">
    <a href="#" class="nav-logo">Dragon Hills</a>
    <div style="font-size: 14px;">문의: 070-8997-3976</div>
  </nav>

  <section style="padding: 20px 0;">
    <h2 style="text-align: center; color: #1a472a;">코스 갤러리</h2>
    <div class="slider-container">
      <div class="slides" style="display: block;">
        <img src="hole1.jpg" onerror="this.src='./src/assets/hole1.jpg'; this.onerror=function(){this.src='https://via.placeholder.com/800x450?text=Hole+1+Checking...';}">
        <div class="slide-text">1번 홀 (Hole 1)</div>
      </div>
      <div class="slides">
        <img src="hole2.jpg" onerror="this.src='./src/assets/hole2.jpg';">
        <div class="slide-text">2번 홀 (Hole 2)</div>
      </div>
      <div class="slides">
        <img src="hole3.jpg" onerror="this.src='./src/assets/hole3.jpg';">
        <div class="slide-text">3번 홀 (Hole 3)</div>
      </div>
      <button class="prev" onclick="plusSlides(-1)">&#10094;</button>
      <button class="next" onclick="plusSlides(1)">&#10095;</button>
    </div>
  </section>

  <section class="reservation-section">
    <div class="res-box">
      <h2 style="margin-top: 0; color: #1a472a;">예약 및 견적 문의</h2>
      <form id="reservationForm">
        <div class="form-group">
          <label>성함</label>
          <input type="text" placeholder="성함을 입력하세요" required>
        </div>
        <div class="form-group">
          <label>연락처</label>
          <input type="tel" placeholder="010-0000-0000" required>
        </div>
        <div class="form-group">
          <label>인원</label>
          <select required>
            <option value="">인원 선택</option>
            <option value="4">4명 (1팀)</option>
            <option value="단체">단체 문의</option>
          </select>
        </div>
        <button type="submit" class="submit-btn">견적 문의하기</button>
      </form>
    </div>
  </section>

  <footer style="padding: 30px; text-align: center; background: #343a40; color: white; font-size: 14px;">
    Dragon Hills C.C. | Ratchaburi, Thailand<br>
    Copyright &copy; 2026. All Rights Reserved.
  </footer>

  <script>
    let slideIndex = 1;
    function plusSlides(n) { showSlides(slideIndex += n); }
    function showSlides(n) {
      let slides = document.getElementsByClassName("slides");
      if (n > slides.length) {slideIndex = 1}    
      if (n < 1) {slideIndex = slides.length}
      for (let i = 0; i < slides.length; i++) { slides[i].style.display = "none"; }
      slides[slideIndex-1].style.display = "block";  
    }
  </script>
</body>
</html>
