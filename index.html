<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>드래곤 힐스 C.C. - 코스 안내</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <link rel="stylesheet" href="./src/style.css">
  <style>
    /* 슬라이더 전체 박스 */
    .slider-container { position: relative; width: 100%; max-width: 850px; margin: 40px auto; overflow: hidden; border-radius: 15px; box-shadow: 0 10px 30px rgba(0,0,0,0.2); background: #f9f9f9; }
    .slides { display: none; width: 100%; text-align: center; position: relative; }
    
    /* 사진 스타일 */
    .slides img { width: 100%; height: 500px; object-fit: cover; display: block; }
    
    /* 사진 위 텍스트 */
    .slide-text { position: absolute; bottom: 0; left: 0; right: 0; background: rgba(0,0,0,0.6); color: white; padding: 20px; font-size: 20px; font-weight: bold; }
    
    /* 화살표 버튼 */
    .prev, .next { cursor: pointer; position: absolute; top: 50%; width: 50px; height: 50px; margin-top: -25px; color: white; background: rgba(26,71,42,0.7); border: none; border-radius: 50%; font-size: 24px; display: flex; align-items: center; justify-content: center; z-index: 10; transition: 0.3s; }
    .next { right: 20px; }
    .prev { left: 20px; }
    .prev:hover, .next:hover { background: rgba(26,71,42,1); transform: scale(1.1); }
    
    /* 애니메이션 */
    .fade { animation: fadeEffect 0.6s; }
    @keyframes fadeEffect { from {opacity: 0.5} to {opacity: 1} }
  </style>
</head>
