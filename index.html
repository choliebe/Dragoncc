<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>드래곤 힐스 C.C.</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        /* 1. 화면 잘림 방지 기본 설정 */
        * { box-sizing: border-box; }
        body { margin: 0; padding: 0; font-family: 'Malgun Gothic', sans-serif; line-height: 1.5; overflow-x: hidden; }
        
        /* 2. 상단 전경 (높이를 조절해서 글자가 안 잘리게 함) */
        .hero { height: 60vh; min-height: 350px; position: relative; display: flex; align-items: center; justify-content: center; color: white; text-align: center; background: #000; padding: 20px; }
        .hero img { position: absolute; top: 0; left: 0; width: 100%; height: 100%; object-fit: cover; opacity: 0.5; z-index: 1; }
        .hero-content { position: relative; z-index: 2; width: 100%; }
        .hero-content h1 { font-size: clamp(1.8rem, 5vw, 2.5rem); margin: 0; }
        .hero-content p { font-size: clamp(0.9rem, 3vw, 1.1rem); margin: 15px 0; }
        .cta-btn { display: inline-block; padding: 12px 25px; background: #c5a059; color: white; text-decoration: none; border-radius: 30px; font-weight: bold; font-size: 1rem; }

        /* 3. 3개 카드 (모바일에서 세로로 예쁘게 정렬) */
        .features { display: flex; flex-wrap: wrap; justify-content: center; padding: 40px 15px; gap: 15px; background: #fff; }
        .card { flex: 1; min-width: 280px; max-width: 350px; text-align: center; padding: 25px 15px; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.05); border: 1px solid #f0f0f0; }
        .card i { font-size: 30px; color: #1a472a; margin-bottom: 15px; }
        .card h3 { margin: 10px 0; font-size: 1.2rem; }

        /* 4. 슬라이더 (이미지 비율 유지) */
        .slider-section { padding: 40px 10px; background: #f9f9f9; text-align: center; }
        .slider-box { max-width: 600px; margin: 0 auto; position: relative; overflow: hidden; border-radius: 15px; background: #eee; aspect-ratio: 4 / 3; }
        .slide { display: none; width: 100%; height: 100%; }
        .slide img { width: 100%; height: 100%; object-fit: cover; }
        .nav-btn { position: absolute; top: 50%; transform: translateY(-50%); background: rgba(0,0,0,0.4); color: white; border: none; width: 40px; height: 40px; border-radius: 50%; cursor: pointer; z-index: 5; }
        .prev { left: 10px; } .next { right: 10px; }

        /* 5. 하단 예약 문의 (번호 고정) */
        footer { padding: 60px 20px; text-align: center; background: #1a472a; color: white; }
        .tel-link { font-size: 1.6rem; font-weight: bold; color: #c5a059; text-decoration: none; display: block; margin-top: 15px; border: 2px solid #c5a059; padding: 10px; border-radius: 10px; }
    </style>
</head>
<body>

    <header class="hero">
        <img src="./src/assets/panorama.jpg" onerror="this.src='https://via.placeholder.com/1200x800?text=Dragon+Hills+C.C.'">
        <div class="hero-content">
            <h1>드래곤 힐스 C.C.</h1>
            <p>태국 라차부리의 완벽한 골프 파라다이스</p>
            <a href="#contact" class="cta-btn">실시간 예약하기</a>
        </div>
    </header>

    <section class="features">
        <div class="card"><i class="fas fa-tree"></i><h3>프라이빗 코스</h3><p>독보적인 집중력을 제공합니다.</p></div>
        <div class="card"><i class="fas fa-utensils"></i><h3>명품 한식 뷔페</h3><p>한국인 주방장이 선사하는 건강식.</p></div>
        <div class="card"><i class="fas fa-hotel"></i><h3>최고급 숙박</h3><p>라운딩 후 편안한 휴식을 약속합니다.</p></div>
    </section>

    <section class="slider-section">
        <h2 style="color: #1a472a;">코스 갤러리</h2>
        <div class="slider-box">
            <div class="slide" style="display: block;"><img src="hole1.jpg" onerror="this.src='hole1.JPG';"></div>
            <div class="slide"><img src="hole2.jpg" onerror="this.src='hole2.JPG';"></div>
            <div class="slide"><img src="hole3.jpg" onerror="this.src='hole3.JPG';"></div>
            <button class="nav-btn prev" onclick="moveSlide(-1)">❮</button>
            <button class="nav-btn next" onclick="moveSlide(1)">❯</button>
        </div>
    </section>

    <footer id="contact">
        <h2>실시간 예약 및 견적 문의</h2>
        <p>태국 현지 한국인 직원이 친절히 상담해 드립니다.</p>
        <a href="tel:070-8098-6781" class="tel-link">📞 070-8098-6781</a>
        <p style="margin-top: 30px; opacity: 0.7; font-size: 12px;">© 2026 Dragon Hills Golf & Country Club.</p>
    </footer>

    <script>
        let currentIdx = 0;
        function moveSlide(n) {
            let slides = document.getElementsByClassName("slide");
            if (slides.length === 0) return;
            slides[currentIdx].style.display = "none";
            currentIdx = (currentIdx + n + slides.length) % slides.length;
            slides[currentIdx].style.display = "block";
        }
    </script>
</body>
</html>
